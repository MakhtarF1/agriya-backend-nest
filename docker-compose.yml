version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: agriya-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agriya_nest
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: passer
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  backend:
    build: .
    container_name: agriya-backend-nest
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
    ports:
      - '8000:8000'
    volumes:
      - ./storage:/app/storage
volumes:
  postgres_data:
