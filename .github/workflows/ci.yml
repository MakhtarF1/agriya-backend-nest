name: backend-ci

on:
  push:
    paths:
      - 'apps/backend-nest/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'apps/backend-nest/**'

jobs:
  build-test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/backend-nest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agriya_nest
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: passer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup env
        run: cp .env.example .env

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:passer@localhost:5432/agriya_nest

      - name: Build app
        run: npm run build

      - name: Run tests
        run: npm test -- --runInBand